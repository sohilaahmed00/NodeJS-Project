openapi: 3.0.0
info:
  title: E-Commerce API
  version: 1.0.0
  description: Full e-commerce REST API

servers:
  - url: /api/v1

tags:
  - name: Auth
  - name: Users
  - name: Products
  - name: Categories
  - name: Reviews
  - name: Cart
  - name: Orders
  - name: Coupons
  - name: Addresses
  - name: Wishlist

# ─────────────────────────────────────────────
# REUSABLE COMPONENTS
# ─────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Auth ──────────────────────────────────
    SignupRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, example: John Doe }
        email: { type: string, format: email, example: john@example.com }
        password: { type: string, format: password, example: secret123 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: john@example.com }
        password: { type: string, format: password, example: secret123 }

    AuthResponse:
      type: object
      properties:
        status: { type: string, example: success }
        token:
          { type: string, example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9... }

    # ── User ──────────────────────────────────
    User:
      type: object
      properties:
        _id: { type: string, example: 64a1f2b3c4e5d6f7a8b9c0d1 }
        name: { type: string, example: John Doe }
        email: { type: string, example: john@example.com }
        role: { type: string, enum: [user, admin], example: user }

    UpdateMeRequest:
      type: object
      properties:
        name: { type: string }
        email: { type: string, format: email }

    # ── Product ───────────────────────────────
    Product:
      type: object
      properties:
        _id: { type: string }
        name: { type: string, example: Running Shoes }
        price: { type: number, example: 99.99 }
        description: { type: string }
        image: { type: string }
        quantity: { type: integer, example: 50 }
        sold: { type: integer, example: 10 }
        priceAfterDiscount: { type: number, example: 79.99 }
        ratingsAverage: { type: number, example: 4.5 }
        ratingsQuantity: { type: integer, example: 12 }
        category: { type: string, example: 64a1f2b3c4e5d6f7a8b9c0d1 }

    ProductRequest:
      type: object
      required: [name, price, description, quantity, category]
      properties:
        name: { type: string }
        price: { type: number }
        description: { type: string }
        image: { type: string, format: binary }
        quantity: { type: integer }
        priceAfterDiscount: { type: number }
        category: { type: string }

    # ── Category ──────────────────────────────
    Category:
      type: object
      properties:
        _id: { type: string }
        name: { type: string, example: Electronics }
        image: { type: string }

    # ── Review ────────────────────────────────
    Review:
      type: object
      properties:
        _id: { type: string }
        product_id: { type: string }
        user_id: { type: string }
        rating: { type: number, minimum: 1, maximum: 5, example: 4 }
        review: { type: string, example: Great product! }

    ReviewRequest:
      type: object
      required: [rating, review]
      properties:
        rating: { type: number, minimum: 1, maximum: 5, example: 4 }
        review: { type: string, example: Great product! }

    # ── Cart ──────────────────────────────────
    CartItem:
      type: object
      properties:
        product: { type: string }
        quantity: { type: integer, example: 2 }
        price: { type: number, example: 99.99 }

    Cart:
      type: object
      properties:
        _id: { type: string }
        user: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/CartItem" }
        totalPrice: { type: number }

    AddToCartRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: string }
        quantity: { type: integer, example: 1 }

    ApplyCouponRequest:
      type: object
      required: [coupon]
      properties:
        coupon: { type: string, example: SAVE10 }

    # ── Order ─────────────────────────────────
    Order:
      type: object
      properties:
        _id: { type: string }
        user: { type: string }
        items: { type: array, items: { $ref: "#/components/schemas/CartItem" } }
        totalPrice: { type: number }
        paymentMethod: { type: string, enum: [cash, card] }
        status:
          {
            type: string,
            enum: [pending, processing, shipped, delivered, cancelled],
          }

    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          {
            type: string,
            enum: [pending, processing, shipped, delivered, cancelled],
          }

    # ── Coupon ────────────────────────────────
    Coupon:
      type: object
      properties:
        _id: { type: string }
        name: { type: string, example: SAVE10 }
        discount: { type: number, example: 10 }
        expire: { type: string, format: date, example: "2025-12-31" }

    CouponRequest:
      type: object
      required: [name, discount, expire]
      properties:
        name: { type: string }
        discount: { type: number }
        expire: { type: string, format: date }

    # ── Address ───────────────────────────────
    Address:
      type: object
      properties:
        _id: { type: string }
        street: { type: string }
        city: { type: string }
        zip: { type: string }
        country:{ type: string }

    AddressRequest:
      type: object
      required: [street, city, country]
      properties:
        street: { type: string }
        city: { type: string }
        zip: { type: string }
        country: { type: string }

    # ── Wishlist ──────────────────────────────
    Wishlist:
      type: object
      properties:
        _id: { type: string }
        user: { type: string }
        products: { type: array, items: { type: string } }

    # ── Common ────────────────────────────────
    SuccessResponse:
      type: object
      properties:
        status: { type: string, example: success }
        data: { type: object }

    ErrorResponse:
      type: object
      properties:
        status: { type: string, example: fail }
        message: { type: string, example: Resource not found }

  responses:
    Unauthorized:
      description: Unauthorized – missing or invalid token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: Forbidden – insufficient permissions
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────
paths:
  # ══ AUTH ══════════════════════════════════════════════════════════
  /auth/signup:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignupRequest" }
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive JWT
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/verify-email/{token}:
    get:
      tags: [Auth]
      summary: Verify email address
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Email verified
        "400":
          description: Invalid or expired token

  # ══ USERS ═════════════════════════════════════════════════════════
  /users/me:
    get:
      tags: [Users]
      summary: Get current logged-in user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /users/updateMe:
    put:
      tags: [Users]
      summary: Update current user profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMeRequest" }
      responses:
        "200":
          description: User updated
        "401": { $ref: "#/components/responses/Unauthorized" }

  /users/deleteMe:
    delete:
      tags: [Users]
      summary: Delete current user account
      security: [{ bearerAuth: [] }]
      responses:
        "204": { description: Account deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /users:
    get:
      tags: [Users]
      summary: Get all users (admin only)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /users/{id}:
    get:
      tags: [Users]
      summary: Get a user by ID (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User found
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Users]
      summary: Update a user (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMeRequest" }
      responses:
        "200": { description: User updated }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Users]
      summary: Delete a user (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: User deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ══ PRODUCTS ══════════════════════════════════════════════════════
  /products:
    get:
      tags: [Products]
      summary: Get all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Product" }
    post:
      tags: [Products]
      summary: Create a product (admin only)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/ProductRequest" }
      responses:
        "201":
          description: Product created
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /products/price/{price}:
    get:
      tags: [Products]
      summary: Get products at or below a price
      parameters:
        - name: price
          in: path
          required: true
          schema: { type: number }
      responses:
        "200": { description: Filtered products }

  /products/search:
    get:
      tags: [Products]
      summary: Search products by name
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string }
      responses:
        "200": { description: Search results }

  /products/filter:
    get:
      tags: [Products]
      summary: Filter products by category
      parameters:
        - name: category
          in: query
          required: true
          schema: { type: string }
      responses:
        "200": { description: Filtered products }

  /products/{id}:
    delete:
      tags: [Products]
      summary: Delete a product (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Product deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Products]
      summary: Update a product (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/ProductRequest" }
      responses:
        "200": { description: Product updated }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ══ CATEGORIES ════════════════════════════════════════════════════
  /categories:
    get:
      tags: [Categories]
      summary: Get all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Category" }
    post:
      tags: [Categories]
      summary: Create a category (admin only)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                image: { type: string, format: binary }
      responses:
        "201": { description: Category created }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /categories/{name}:
    get:
      tags: [Categories]
      summary: Get category by name
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Category found }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Categories]
      summary: Update a category (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name: { type: string }
                image: { type: string, format: binary }
      responses:
        "200": { description: Category updated }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [Categories]
      summary: Delete a category (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Category deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ══ REVIEWS ═══════════════════════════════════════════════════════
  /reviews:
    get:
      tags: [Reviews]
      summary: Get all reviews
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Review" }

  /reviews/product/{productId}:
    get:
      tags: [Reviews]
      summary: Get reviews for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Product reviews }
    post:
      tags: [Reviews]
      summary: Create a review for a product (user only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReviewRequest" }
      responses:
        "201": { description: Review created }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /reviews/{id}:
    patch:
      tags: [Reviews]
      summary: Update a review (user only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReviewRequest" }
      responses:
        "200": { description: Review updated }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Reviews]
      summary: Delete a review (user only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Review deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ══ CART ══════════════════════════════════════════════════════════
  /cart:
    get:
      tags: [Cart]
      summary: Get current user's cart
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: User cart
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data: { $ref: "#/components/schemas/Cart" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Cart]
      summary: Add item to cart
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddToCartRequest" }
      responses:
        "200": { description: Item added }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      tags: [Cart]
      summary: Clear entire cart
      security: [{ bearerAuth: [] }]
      responses:
        "204": { description: Cart cleared }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /cart/applyCoupon:
    patch:
      tags: [Cart]
      summary: Apply a coupon to the cart
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApplyCouponRequest" }
      responses:
        "200": { description: Coupon applied }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /cart/{itemId}:
    patch:
      tags: [Cart]
      summary: Update item quantity in cart
      security: [{ bearerAuth: [] }]
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity: { type: integer, example: 3 }
      responses:
        "200": { description: Quantity updated }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      tags: [Cart]
      summary: Remove item from cart
      security: [{ bearerAuth: [] }]
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Item removed }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ══ ORDERS ════════════════════════════════════════════════════════
  /orders:
    get:
      tags: [Orders]
      summary: Get orders (own orders for user, all for admin)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Order" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get a single order by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Order found }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /orders/cash:
    post:
      tags: [Orders]
      summary: Create a cash order from cart
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Cash order created }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /orders/checkout-session:
    post:
      tags: [Orders]
      summary: Create a Stripe checkout session
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Checkout session URL returned }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /orders/{id}/cancel:
    post:
      tags: [Orders]
      summary: Cancel a cash order
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Order cancelled }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Update order status (admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateOrderStatusRequest" }
      responses:
        "200": { description: Status updated }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ══ COUPONS ═══════════════════════════════════════════════════════
  /coupons:
    get:
      tags: [Coupons]
      summary: Get all coupons (admin/manager)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of coupons
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Coupons]
      summary: Create a coupon (admin/manager)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CouponRequest" }
      responses:
        "201": { description: Coupon created }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /coupons/{id}:
    get:
      tags: [Coupons]
      summary: Get a coupon by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Coupon found }
